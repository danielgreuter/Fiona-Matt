name: RZ Patch ausführen

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Patch ausführen
        run: python3 .github/scripts/patch_rz.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Keine Aenderungen" || git commit -m "fix: Resultate Zoom aktualisiert"
          git push
