name: Resultate Zoom hinzufügen

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Patch anwenden
        run: |
          python3 - << 'PYEOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          NEW_CSS = """
          /* ── RESULT ZOOM OVERLAY ── */
          .rz-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            z-index: 1000; align-items: flex-end; justify-content: center;
            padding: 0 0 env(safe-area-inset-bottom,12px);
          }
          .rz-overlay.open { display: flex; }
          .rz-card {
            background: var(--surface); border-radius: 20px 20px 14px 14px;
            padding: 20px 18px 24px; width: 100%; max-width: 480px;
            box-shadow: 0 -4px 40px rgba(0,0,0,0.18), 0 20px 60px rgba(0,0,0,0.45);
            animation: necSlideIn 0.22s ease; max-height: 88vh; overflow-y: auto;
            position: relative;
          }
          .rz-close-btn {
            position: absolute; top: 14px; right: 14px; width: 28px; height: 28px;
            border-radius: 50%; background: var(--surface2); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            cursor: pointer; color: var(--text-muted); line-height: 1;
          }
          .rz-header { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
          .rz-disc-pill { font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 999px; color: #fff; }
          .rz-disc-100m  { background: var(--orange); }
          .rz-disc-60m   { background: var(--blue); }
          .rz-disc-200m  { background: var(--purple); }
          .rz-disc-lj    { background: var(--green); }
          .rz-disc-80m   { background: var(--gold); }
          .rz-disc-other { background: var(--text-muted); }
          .rz-tag {
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            background: var(--surface2); padding: 3px 8px;
            border-radius: 999px; border: 1px solid var(--border);
          }
          .rz-result-block {
            text-align: center; padding: 18px 0 14px;
            border-bottom: 1px solid var(--border); margin-bottom: 14px;
          }
          .rz-time-big {
            font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500;
            color: var(--text); letter-spacing: -2px; line-height: 1;
          }
          .rz-wind-label { font-size: 13px; color: var(--text-muted); margin-top: 5px; font-weight: 600; }
          .rz-pb-banner {
            background: var(--gold-light); color: var(--gold); font-size: 12px;
            font-weight: 700; padding: 8px 14px; border-radius: 10px;
            margin-bottom: 14px; text-align: center; letter-spacing: 0.3px;
          }
          .rz-row {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
          }
          .rz-row:last-child { border-bottom: none; }
          .rz-row-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
          .rz-row-text { flex: 1; color: var(--text); font-weight: 500; }
          .rz-wrc { display:inline-block; font-size:9px; font-weight:700;
            background:var(--blue-light); color:var(--blue);
            padding:1px 5px; border-radius:3px; margin-left:4px; vertical-align:middle; }
          .rz-sameday { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
          .rz-sameday-title {
            font-size: 11px; font-weight: 700; color: var(--text-dim);
            letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px;
          }
          .rz-sd-item {
            display: flex; align-items: center; gap: 10px; padding: 7px 10px;
            border-radius: 8px; background: var(--surface2);
            border: 1px solid var(--border); margin-bottom: 5px; cursor: pointer;
          }
          .rz-sd-disc { font-size: 11px; font-weight: 700; color: var(--text-muted); min-width: 38px; }
          .rz-sd-time { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--text); flex:1; }
          .rz-sd-place { font-size:11px; color:var(--text-dim); font-weight:600; }
          """

          NEW_HTML = """
          <!-- ── RESULT ZOOM OVERLAY ── -->
          <div class="rz-overlay" id="rz-overlay" onclick="rzClose()">
            <div class="rz-card" onclick="event.stopPropagation()">
              <div class="rz-close-btn" onclick="rzClose()">&#10005;</div>
              <div class="rz-header" id="rz-header"></div>
              <div class="rz-result-block">
                <div class="rz-time-big" id="rz-time">&#8211;</div>
                <div class="rz-wind-label" id="rz-wind" style="display:none"></div>
              </div>
              <div class="rz-pb-banner" id="rz-pb" style="display:none">&#9733; Pers&#246;nliche Bestleistung</div>
              <div id="rz-details"></div>
              <div class="rz-sameday" id="rz-sameday" style="display:none">
                <div class="rz-sameday-title">Weitere Starts an diesem Tag</div>
                <div id="rz-sd-list"></div>
              </div>
            </div>
          </div>
          """

          NEW_JS = """
          // ── RESULT ZOOM ─────────────────────────────────────────────────────
          window._rzData = null;
          (function() {
            var _orig = window.fetch;
            window.fetch = function() {
              var url = arguments[0] || '';
              return _orig.apply(this, arguments).then(function(resp) {
                if (typeof url === 'string' && url.indexOf('sa-results') >= 0) {
                  resp.clone().json().then(function(d) {
                    if (d && d.results) window._rzData = d;
                  }).catch(function(){});
                }
                return resp;
              });
            };
          })();
          (function() {
            function tagItems(root) {
              var items = (root.classList && root.classList.contains('result-item')) ? [root]
                : (root.querySelectorAll ? [].slice.call(root.querySelectorAll('.result-item')) : []);
              items.forEach(function(item) {
                if (item.dataset.ri !== undefined || !window._rzData) return;
                var tEl = item.querySelector('.result-time');
                var cEl = item.querySelector('.result-competition');
                if (!tEl || !cEl) return;
                var t = tEl.textContent.trim(), c = cEl.textContent.trim(), idx = -1;
                window._rzData.results.forEach(function(r, i) {
                  if (idx >= 0) return;
                  var cc = r.competition.replace(/\\s*\\(WRC[^)]*\\)/i,'').trim();
                  if (r.result === t && (r.competition.indexOf(c) >= 0 || c.indexOf(cc) >= 0)) idx = i;
                });
                if (idx >= 0) { item.dataset.ri = idx; item.style.cursor = 'pointer'; }
              });
            }
            var obs = new MutationObserver(function(muts) {
              muts.forEach(function(m) {
                m.addedNodes.forEach(function(n) { if (n.nodeType === 1) tagItems(n); });
              });
            });
            obs.observe(document.body, { childList: true, subtree: true });
          })();
          document.addEventListener('click', function(e) {
            if (!window._rzData) return;
            var item = e.target.closest && e.target.closest('.result-item[data-ri]');
            if (!item) return;
            rzOpen(parseInt(item.dataset.ri));
          });
          function rzDiscClass(d) {
            d = (d || '').toLowerCase().replace(/\\s/g,'');
            if (d==='100m') return 'rz-disc-100m';
            if (d==='60m')  return 'rz-disc-60m';
            if (d==='200m') return 'rz-disc-200m';
            if (d.indexOf('jump')>=0||d.indexOf('weit')>=0) return 'rz-disc-lj';
            if (d==='80m')  return 'rz-disc-80m';
            return 'rz-disc-other';
          }
          function rzDecodePlatz(p) {
            if (!p) return '';
            var m = String(p).match(/^(\\d+)(qf|sf|[rfh])?(\\d+)?$/i);
            if (!m) return '\\uD83C\\uDF96 Rang ' + p;
            var rank=m[1], round=(m[2]||'').toLowerCase(), num=m[3]||'';
            var R={r:'Lauf',h:'Vorlauf',f:'Final',qf:'Viertelfinale',sf:'Halbfinale'};
            var s='Rang '+rank;
            if (round && R[round]) s += ' \\u00B7 '+R[round]+(num?' '+num:'');
            return s;
          }
          function rzOpen(idx) {
            var d = window._rzData;
            if (!d || !d.results) return;
            var r = d.results[idx];
            if (!r) return;
            var hdr = document.getElementById('rz-header');
            var indoor = r.indoor ? '\\uD83C\\uDFDF Halle' : '\\u2600\\uFE0F Outdoor';
            hdr.innerHTML = '<span class="rz-disc-pill '+rzDiscClass(r.discipline)+'">'+r.discipline+'</span>'
              +'<span class="rz-tag">'+indoor+'</span>'
              +'<span class="rz-tag">'+r.year+'</span>';
            document.getElementById('rz-time').textContent = r.result || '\\u2013';
            var wEl = document.getElementById('rz-wind');
            if (r.wind !== null && r.wind !== undefined && !r.indoor) {
              wEl.textContent = 'Wind: '+(r.wind>=0?'+':'')+r.wind+' m/s';
              wEl.style.display = '';
            } else { wEl.style.display = 'none'; }
            var pb = d.pbs && d.pbs[r.discipline];
            document.getElementById('rz-pb').style.display =
              (pb && pb.result===r.result && pb.date===r.date) ? '' : 'none';
            var cc = r.competition.replace(/\\s*\\(WRC[^)]*\\)\\s*/i,'').trim();
            var isWRC = /WRC/i.test(r.competition);
            document.getElementById('rz-details').innerHTML =
              '<div class="rz-row"><span class="rz-row-icon">\\uD83C\\uDF96</span>'
                +'<span class="rz-row-text">'+rzDecodePlatz(r.place)+'</span></div>'
              +'<div class="rz-row"><span class="rz-row-icon">\\uD83C\\uDFC6</span>'
                +'<span class="rz-row-text">'+cc+(isWRC?'<span class="rz-wrc">WRC</span>':'')+'</span></div>'
              +'<div class="rz-row"><span class="rz-row-icon">\\uD83D\\uDCCD</span>'
                +'<span class="rz-row-text">'+(r.venue||'\\u2013')+'</span></div>'
              +'<div class="rz-row"><span class="rz-row-icon">\\uD83D\\uDCC5</span>'
                +'<span class="rz-row-text">'+(r.date||'\\u2013')+'</span></div>';
            var sameDay = d.results.filter(function(x,i){ return i!==idx && x.competition===r.competition && x.date===r.date; });
            var sdEl = document.getElementById('rz-sameday');
            var sdList = document.getElementById('rz-sd-list');
            if (sameDay.length > 0) {
              sdList.innerHTML = sameDay.map(function(x) {
                var ws = (x.wind!==null&&!x.indoor)?(' <span style="color:var(--text-dim);font-size:11px">'+(x.wind>=0?'+':'')+x.wind+'</span>'):'';
                return '<div class="rz-sd-item" onclick="rzOpen('+d.results.indexOf(x)+')">'
                  +'<span class="rz-sd-disc">'+x.discipline+'</span>'
                  +'<span class="rz-sd-time">'+x.result+ws+'</span>'
                  +'<span class="rz-sd-place">'+(x.place||'')+'</span></div>';
              }).join('');
              sdEl.style.display = '';
            } else { sdEl.style.display = 'none'; }
            document.getElementById('rz-overlay').classList.add('open');
          }
          function rzClose() { document.getElementById('rz-overlay').classList.remove('open'); }
          // ─────────────────────────────────────────────────────────────────────
          """

          changed = []
          if 'id="rz-overlay"' not in html:
              if NEW_CSS.strip()[:20] not in html:
                  html = html.replace('</style>', NEW_CSS + '\n</style>', 1)
                  changed.append('CSS')
              html = html.replace('</body>', NEW_HTML + '\n</body>', 1)
              changed.append('HTML')
              last_script = html.rfind('</script>')
              if last_script >= 0:
                  html = html[:last_script] + NEW_JS + html[last_script:]
                  changed.append('JS')
          else:
              print('Bereits gepatcht — nichts zu tun')

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          if changed:
              print('Patch OK: ' + ', '.join(changed))
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "feat: Resultate Zoom-Funktion hinzugefügt"
          git push
