name: Swiss Athletics Athleten-Resultate aktualisieren

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Playwright installieren
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
      - name: Scrape Swiss Athletics Athleten-Resultate
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: node scrape_athlete_results_v34.js --upload
      - name: Ergebnis als Artefakt speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: athlete-results
          path: |
            athlete_results.json
            debug_*.png
