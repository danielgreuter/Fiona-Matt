name: Swiss Athletics Bestenliste aktualisieren

on:
  schedule:
    # Täglich um 06:00 UTC (= 07:00 / 08:00 Schweizer Zeit)
    - cron: '0 6 * * *'

  # Manuell auslösen (z.B. nach einem Wettkampf)
  workflow_dispatch:
    inputs:
      notify:
        description: 'Benachrichtigung wenn Rang sich ändert?'
        required: false
        default: 'true'

jobs:
  scrape:
    name: Bestenliste scrapen & in KV speichern
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Repository auschecken ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────
      - name: Node.js 20 setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencies installieren ─────────────────────────────────
      - name: Dependencies installieren
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      # ── 4. Scraper ausführen ─────────────────────────────────────────
      - name: Bestenliste scrapen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: node scrape_bestenliste.js --upload

      # ── 5. bestenliste.json als Artefakt speichern (für Debugging) ───
      - name: Ergebnis als Artefakt speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bestenliste-${{ github.run_id }}
          path: bestenliste.json
          retention-days: 30

      # ── 6. Screenshots bei Fehler speichern ──────────────────────────
      - name: Debug-Screenshots speichern (nur bei Fehler)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: /tmp/alabus_debug_*.png
          retention-days: 7
