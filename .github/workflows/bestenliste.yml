name: Bestenliste scrapen & in KV speichern

on:
  schedule:
    - cron: '0 6 * * *'   # täglich 06:00 UTC
  workflow_dispatch:        # manuell triggerbar

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bestenliste scrapen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: node scrape_bestenliste.js --upload

      - name: Ergebnis als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: bestenliste
          path: bestenliste.json
