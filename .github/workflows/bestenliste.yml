name: Bestenliste scrapen & in KV speichern

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    name: Bestenliste scrapen & in KV speichern
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies installieren
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Bestenliste scrapen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: node scrape_2025.js --upload

      - name: Debug-Artefakte hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            screenshot_results.png
            page_results.html
          if-no-files-found: warn
          retention-days: 7

      - name: Ergebnis als Artefakt speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bestenliste-${{ github.run_id }}
          path: bestenliste.json
          if-no-files-found: warn
          retention-days: 30
