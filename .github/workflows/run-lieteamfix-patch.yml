name: Team-LIE Modal Fix Patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch index.html
        run: python3 .github/scripts/patch_lieteamfix.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Keine Aenderung - nichts zu committen."
          else
            git add index.html
            git commit -m "feat: Team-LIE Modal - Chart raus, Beste Disziplinen (5), Top-5 Layout+Wind"
            git push
          fi
