name: CH-Wettkampfkalender aktualisieren

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Playwright installieren
        run: |
          npm install playwright
          npx playwright install chromium --with-deps
      - name: CH-Kalender scrapen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_KV_NS_ID:   ${{ secrets.CF_KV_NS_ID }}
        run: node scrape_chcalendar.js --upload
      - name: Ergebnis als Artefakt speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ch-calendar
          path: ch_calendar.json
